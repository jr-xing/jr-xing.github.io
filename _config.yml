# Dependencies
markdown:         kramdown
highlighter:      rouge

# Setup
title:            Jerry Xing
tagline:          '(╯°Д°）╯︵'
description:      'WUSTL CSE MS Student'
url:              https://jr-xing.github.io
baseurl:          '/'
                  # the optional subpath of your site, e.g. "/blog"
                  # NB: This applies to all pages in your Jekyll site.
                  # If you want to move just the blog index pages but keep
                  # other pages at root, see the paginate_path and
                  # sidebar_blog_link below.

author:
  name:           'Jerry Xing'
  url:            https://twitter.com/fongandrewc

paginate:         5
# paginate_path:    '/page:num'
paginate_path:    '/BlogsI/page:num'
                    # Or '/blog/page:num' if you want to move your index pages

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate

# Custom vars
disqus:
  shortname:   jr-xing

version:            3.7.1
sidebar_home_link:  true
sidebar_blog_link:  '/index_blogs'   # By default, your home page is your blog
                                # page. If you change your paginate_path,
                                # set this to the root of the paginate_path
                                # to enable a separate blog link.
github:
  repo:             https://github.com/fongandrew/hydeout

excerpt_separator: <!--more-->  #这里可以定义自己的摘要分割符

gems:
  - jekyll-last-modified-at
# http://daemon369.github.io/blog/2014/01/16/jekyll-using-excerpt
# https://stackoverflow.com/questions/19389451/how-can-i-get-a-post-excerpt-in-jekyll

